<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elden Game - Jouer</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:   #c9a84c;
      --gold2:  #f0d080;
      --dark:   #0a0806;
      --dark2:  #12100d;
      --dark3:  #1c1812;
      --ash:    #5a5040;
      --text:   #d4c9a8;
      --border: #3a3020;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      position: relative;
    }

    a.back {
      position: absolute;
      top: 1.5rem;
      left: 2rem;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      color: var(--ash);
      text-decoration: none;
    }

    a.back:hover { color: var(--gold); }

    .frame {
      width: clamp(260px, 32vw, 400px);
      aspect-ratio: 1;
      border: 1px solid var(--border);
      background: var(--dark2);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .frame::before, .frame::after,
    .frame-inner::before, .frame-inner::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: var(--gold);
      border-style: solid;
    }

    .frame::before  { top: -1px;    left: -1px;  border-width: 1px 0 0 1px; }
    .frame::after   { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

    .frame-inner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .frame-inner::before { top: -1px;    right: -1px; border-width: 1px 1px 0 0; }
    .frame-inner::after  { bottom: -1px; left: -1px;  border-width: 0 0 1px 1px; }

    .placeholder {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--ash);
      text-align: center;
      line-height: 2.2;
    }

    .placeholder svg {
      display: block;
      margin: 0 auto 1rem;
      opacity: 0.25;
    }

    #result-card {
      display: none;
      position: absolute;
      inset: 0;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #result-card.visible { display: flex; }

    #result-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    #result-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      color: var(--gold);
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      padding: 1.5rem 1rem 0.75rem;
      text-align: center;
    }

    #result-loading {
      display: none;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--ash);
    }

    .desc-box {
      width: clamp(260px, 32vw, 400px);
      min-height: 3.5rem;
      font-family: 'EB Garamond', serif;
      font-size: 0.9rem;
      color: var(--text);
      opacity: 0.7;
      line-height: 1.6;
      text-align: center;
    }

    .search-bar {
      display: flex;
      align-items: center;
      width: clamp(260px, 40vw, 480px);
      border: 1px solid var(--border);
      background: var(--dark2);
      position: relative;
    }

    .search-bar::before, .search-bar::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-color: var(--gold);
      border-style: solid;
    }

    .search-bar::before { top: -1px;    left: -1px;  border-width: 1px 0 0 1px; }
    .search-bar::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

    #search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      padding: 0.85rem 1.2rem;
    }

    #search-input::placeholder { color: var(--ash); font-style: italic; }

    #search-btn {
      background: transparent;
      border: none;
      border-left: 1px solid var(--border);
      color: var(--gold);
      cursor: pointer;
      padding: 0.85rem 1.2rem;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
    }

    #search-btn:hover { background: rgba(201,168,76,0.08); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--border); }
  </style>
</head>
<body>

  <a href="index.html" class="back">← Retour</a>

  <div class="frame">
    <div class="frame-inner">
      <div class="placeholder" id="placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
        CHERCHE UN BOSS<br>OU UN ITEM
      </div>
      <div id="result-loading">CONSULTATION DES ARCHIVES…</div>
      <div id="result-card">
        <img id="result-img" src="" alt="">
        <div id="result-name"></div>
      </div>
    </div>
  </div>

  <div class="desc-box">
    <span id="result-desc"></span>
  </div>

  <div class="search-bar">
    <input id="search-input" type="text" placeholder="Ex : Malenia, Ancestral Spirit…">
    <button id="search-btn">CHERCHER</button>
  </div>

  <script src="../models/EldenModel.js"></script>
  <script src="../controllers/EldenController.js"></script>
  <script>
    PlayController.init();
  </script>
</body>
</html>
