<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elden Game - Play</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/game.css">
</head>



<body>
  <header>
    <!-- Bouton retour -->
    <a href="index.html" class="back">← Back</a>
  </header>

  <div id="home-bg"></div>

  <!-- Score -->
  <div id="score-container">
    Score : <span id="score"> ? </span>
  </div> 

  <!-- Cadre du boss -->
  <div class="frame">
    <img id="frame-bg" src="" alt="Boss" />
  </div>

  <!-- Description du boss -->
  <div class="desc-box">
    <span id="result-desc"></span>
  </div>

  <!-- Barre de recherche -->
  <div id="feedback" class="hidden"></div>
  <div class="search-container">
    <div class="search-bar">
      <input id="search-input" type="text" placeholder="Ex : Malenia, Ancestral Spirit…">
      <button id="search-btn">SEARCH</button>
    </div>
    <div id="suggestions"></div>
  </div>

  <!-- Script principal -->
  <script type="module" src="../main.js"></script>

</body>
</html>
